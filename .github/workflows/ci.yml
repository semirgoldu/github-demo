# This workflow runs on every push and pull request
name: CI

on:
  push:
    branches: [main]       # Run when code is pushed to main
  pull_request:
    branches: [main]       # Run when a PR targets main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest  # GitHub-hosted runner (a fresh Linux VM)

    steps:
      # 1. Check out the code from the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install pytest

      # 4. Run tests — if any fail, the workflow fails and the PR is blocked
      - name: Run tests
        run: pytest test_calculator.py -v
